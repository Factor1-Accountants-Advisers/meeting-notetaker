version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: meetings-postgres
    environment:
      POSTGRES_USER: meetings_user
      POSTGRES_PASSWORD: meetings_password
      POSTGRES_DB: meetings_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetings_user -d meetings_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meetings-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: meetings-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: meetings-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://meetings_user:meetings_password@postgres:5432/meetings_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - AZURE_STORAGE_CONTAINER_NAME=meeting-audio
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: .
    container_name: meetings-celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://meetings_user:meetings_password@postgres:5432/meetings_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - AZURE_STORAGE_CONTAINER_NAME=meeting-audio
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info -Q default,pipeline

volumes:
  postgres_data:
  redis_data:
  minio_data:
