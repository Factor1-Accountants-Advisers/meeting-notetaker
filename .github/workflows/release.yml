# Release build (decision #12): tag vX.Y.Z -> build, sign, publish.
#
# Until the code-signing certificate and the Azure Blob update feed exist,
# this produces an UNSIGNED installer as a workflow artifact. To go live:
#   1. Add secrets CSC_LINK (base64 PFX) + CSC_KEY_PASSWORD, or switch to
#      Azure Trusted Signing, and remove the signAndEditExecutable override.
#   2. Add AZURE_STORAGE_CONNECTION_STRING and uncomment the publish step
#      so the installer + latest.yml land in the Blob update feed.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-backend:
    runs-on: windows-latest
    outputs:
      bundle-path: backend/dist/notetaker-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-build.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Download ffmpeg (BtbN essentials, LGPL)
        working-directory: backend
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-git-essentials.7z"
          $hash = ""  # manual: fill in after first successful download
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.7z
          7z x ffmpeg.7z -offmpeg-extracted
          New-Item -ItemType Directory -Force third_party\ffmpeg
          Copy-Item ffmpeg-extracted\*\bin\ffmpeg.exe third_party\ffmpeg\ffmpeg.exe

      - name: Build backend bundle (PyInstaller onedir)
        working-directory: backend
        run: python -m PyInstaller meeting-notetaker-backend.spec

      - name: Smoke test the bundle
        shell: pwsh
        run: .\scripts\smoke-backend-bundle.ps1

      - name: Upload backend bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: notetaker-backend-bundle
          path: backend/dist/notetaker-backend/
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download backend bundle
        uses: actions/download-artifact@v4
        with:
          name: notetaker-backend-bundle
          path: backend/dist/notetaker-backend

      - name: Type check
        run: npm run typecheck

      - name: Write credentials file (from GitHub secrets)
        # utf8NoBOM is required: a BOM-prefixed first line corrupts the first
        # key name and the supervisor would silently fall back to stubs.
        shell: pwsh
        env:
          MN_OPENAI_API_KEY: ${{ secrets.MN_OPENAI_API_KEY }}
          MN_PYANNOTE_API_KEY: ${{ secrets.MN_PYANNOTE_API_KEY }}
          # Non-secret rollout config (repository variables). Without the
          # expansion list, manual/ad-hoc recordings only ever consider the
          # recorder's own voiceprint (IN-79) — a silent behaviour regression
          # against locally built installers.
          MN_VOICEPRINT_EXPANSION_EMPLOYEE_IDS: ${{ vars.MN_VOICEPRINT_EXPANSION_EMPLOYEE_IDS }}
          MN_VOICEPRINT_EXPANSION_CAP: ${{ vars.MN_VOICEPRINT_EXPANSION_CAP }}
        run: |
          $lines = @()
          if ($env:MN_OPENAI_API_KEY) { $lines += "MN_OPENAI_API_KEY=$env:MN_OPENAI_API_KEY" }
          if ($env:MN_PYANNOTE_API_KEY) { $lines += "MN_PYANNOTE_API_KEY=$env:MN_PYANNOTE_API_KEY" }
          if ($env:MN_VOICEPRINT_EXPANSION_EMPLOYEE_IDS) {
            $lines += "MN_VOICEPRINT_EXPANSION_EMPLOYEE_IDS=$env:MN_VOICEPRINT_EXPANSION_EMPLOYEE_IDS"
            if ($env:MN_VOICEPRINT_EXPANSION_CAP) { $lines += "MN_VOICEPRINT_EXPANSION_CAP=$env:MN_VOICEPRINT_EXPANSION_CAP" }
          } else {
            Write-Warning "MN_VOICEPRINT_EXPANSION_EMPLOYEE_IDS repo variable not set — manual recordings will only match the recorder's voiceprint (IN-79 expansion disabled)"
          }
          if ($lines.Count -eq 0) {
            Write-Error "No credential secrets set — refusing to build a stub installer for release"
            exit 1
          }
          $lines -join "`n" | Out-File -Encoding utf8NoBOM -FilePath backend.env
          Write-Host "Wrote backend.env ($($lines.Count) keys)"

      - name: Pre-package checks (bundle + ffmpeg + credentials into staging)
        run: node scripts/prepackage.cjs

      - name: Build installer (unsigned until cert lands)
        # CI runners have symlink rights, so exe metadata editing is re-enabled
        # here (it is disabled in electron-builder.yml for dev machines).
        run: npx electron-vite build && npx electron-builder --publish never --config.win.signAndEditExecutable=true

      - name: Assert credentials shipped in packaged output
        shell: pwsh
        run: |
          $packagedEnv = "dist/win-unpacked/resources/backend/backend.env"
          if (-not (Test-Path $packagedEnv)) {
            Write-Error "Packaged output is missing $packagedEnv — installer would ship stub-only"
            exit 1
          }
          Write-Host "Packaged credentials present: $packagedEnv"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: meeting-notetaker-installer
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: error

      # - name: Publish to Azure Blob update feed
      #   run: |
      #     az storage blob upload-batch \
      #       --destination updates \
      #       --source dist \
      #       --pattern "*.exe" --pattern "latest.yml" \
      #       --connection-string "$env:AZURE_STORAGE_CONNECTION_STRING" \
      #       --overwrite
