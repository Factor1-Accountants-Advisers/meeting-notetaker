      #     az storage blob upload-batch \
      #       --destination updates \
      #       --source dist \
      #       --pattern "*.exe" --pattern "latest.yml" \
      #       --connection-string "$env:AZURE_STORAGE_CONNECTION_STRING" \
      #       --overwrite
