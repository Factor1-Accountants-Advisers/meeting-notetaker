name: Build and Release MSI

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write  # Required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      # ── Python runtime ─────────────────────────────────────────────────────
      # Build a self-contained embedded Python runtime so the MSI needs no
      # Python pre-installed on the user's machine.
      - name: Set up embedded Python runtime
        shell: pwsh
        run: |
          $pythonVersion = "3.11.9"
          $zipUrl = "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-embed-amd64.zip"
          $zipPath = "python-embed.zip"

          Write-Host "Downloading Python $pythonVersion embeddable..."
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "desktop/python-runtime" -Force

          # Enable site-packages so pip-installed packages are importable
          $pthFile = Get-ChildItem -Path "desktop/python-runtime" -Filter "*._pth" | Select-Object -First 1
          if ($pthFile) {
            $content = Get-Content $pthFile.FullName -Raw
            $content = $content -replace "#import site", "import site"
            Set-Content -Path $pthFile.FullName -Value $content -NoNewline
            Write-Host "Enabled site-packages in $($pthFile.Name)"
          }

          # Bootstrap pip into the embeddable runtime
          Write-Host "Installing pip..."
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          ./desktop/python-runtime/python.exe get-pip.py --no-warn-script-location

          # Install backend dependencies
          Write-Host "Installing backend requirements..."
          ./desktop/python-runtime/python.exe -m pip install `
            -r backend/requirements-base.txt `
            --no-warn-script-location `
            --no-compile

          Write-Host "Python runtime ready."

      # ── Production environment ─────────────────────────────────────────────
      # Creates the .env.production file that gets bundled inside the MSI.
      # GH_TOKEN here is a long-lived fine-grained PAT (stored as UPDATER_TOKEN
      # secret) that allows the installed app to download future update MSIs
      # from private GitHub Releases.
      - name: Create .env.production
        shell: pwsh
        run: |
          @"
          ENVIRONMENT=production
          AZURE_AD_TENANT_ID=${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_AD_CLIENT_ID=${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_CLIENT_SECRET=${{ secrets.AZURE_AD_CLIENT_SECRET }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ASSEMBLYAI_API_KEY=${{ secrets.ASSEMBLYAI_API_KEY }}
          GH_TOKEN=${{ secrets.UPDATER_TOKEN }}
          "@ | Set-Content desktop/.env.production
        # Note: UPDATER_TOKEN must be a GitHub fine-grained PAT with:
        #   - Repository: guerrerojoseph/meeting-notetaker
        #   - Permission: Contents → Read-only
        # Create it at: https://github.com/settings/tokens?type=beta

      # ── Build ──────────────────────────────────────────────────────────────
      # npm run build runs: build:web (Next.js static export → desktop/web-out)
      #                     build:electron (TypeScript compilation)
      - name: Build app
        run: npm run build
        working-directory: desktop

      # ── Package and publish ────────────────────────────────────────────────
      # GH_TOKEN (GITHUB_TOKEN) is the short-lived Actions token used by
      # electron-builder to create the GitHub Release and upload assets.
      - name: Build MSI and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
        working-directory: desktop
