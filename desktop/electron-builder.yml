appId: com.factor1.meetingnotetaker
productName: Meeting Note-Taker
directories:
  output: release
files:
  - dist/**/*
  - web-out/**/*
  - assets/**/*
  - node_modules/**/*
  - package.json
asarUnpack:
  - node_modules/ffmpeg-static/**
extraResources:
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!**/.env"
      - "!**/.env.*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.pytest_cache/**"
      - "!**/.venv/**"
      - "!**/venv/**"
      - "!**/*.db"
      - "!**/*.sqlite"
      - "!**/*.sqlite3"
      - "!**/*.log"
      - "!tests/**"
      - "!data/**"
  - from: python-runtime
    to: python
  - from: .env.production
    to: .env.production
win:
  target:
    - target: msi
      arch: [x64]
  icon: assets/icon-installer.png
msi:
  oneClick: false
  perMachine: true
  additionalWixArgs:
    - -ext
    - WixUtilExtension
msiProjectCreated: scripts/msi-project-created.cjs
publish:
  provider: github
  owner: guerrerojoseph
  repo: meeting-notetaker
  private: true
  releaseType: release
